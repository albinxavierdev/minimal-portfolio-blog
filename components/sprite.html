<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>8-bit Sprite</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      gap: 24px;
    }

    h1 {
      color: #a78bfa;
      font-size: 0.85rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      opacity: 0.7;
    }

    .sprite-wrap {
      position: relative;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      filter: drop-shadow(0 0 20px rgba(167, 139, 250, 0.3));
    }

    canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      display: block;
    }

    .controls {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
    }

    button {
      background: #2d2d4e;
      color: #a78bfa;
      border: 1px solid #4c4c7a;
      padding: 7px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-family: 'Courier New', monospace;
      font-size: 0.78rem;
      letter-spacing: 0.1em;
      transition: all 0.15s;
    }

    button:hover {
      background: #3d3d6e;
      border-color: #a78bfa;
    }

    button.active {
      background: #a78bfa;
      color: #1a1a2e;
    }

    .scale-label {
      color: #6b7280;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
    }

    .palette-strip {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 400px;
    }

    .swatch {
      width: 16px;
      height: 16px;
      border-radius: 2px;
      border: 1px solid rgba(255,255,255,0.1);
    }
  </style>
</head>
<body>

  <h1>8-bit sprite</h1>

  <div class="sprite-wrap">
    <canvas id="c"></canvas>
  </div>

  <div class="controls">
    <span class="scale-label">scale:</span>
    <button onclick="setScale(4)">4×</button>
    <button onclick="setScale(6)" class="active">6×</button>
    <button onclick="setScale(8)">8×</button>
    <button onclick="setScale(10)">10×</button>
    <button onclick="setScale(12)">12×</button>
  </div>

  <div class="controls">
    <button onclick="toggleGrid()">toggle grid</button>
    <button onclick="exportPNG()">export PNG</button>
  </div>

  <div class="palette-strip" id="paletteStrip"></div>

const W = 45, H = 45;
let scale = 6;
let showGrid = false;

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

function setScale(s) {
  scale = s;
  document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  draw();
}

function toggleGrid() {
  showGrid = !showGrid;
  draw();
}

function draw() {
  canvas.width  = W * scale;
  canvas.height = H * scale;
  ctx.imageSmoothingEnabled = false;

  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      const ci = PIXELS[y][x];
      ctx.fillStyle = PALETTE[ci];
      ctx.fillRect(x * scale, y * scale, scale, scale);
    }
  }

  if (showGrid && scale >= 6) {
    ctx.strokeStyle = 'rgba(0,0,0,0.15)';
    ctx.lineWidth = 0.5;
    for (let x = 0; x <= W; x++) {
      ctx.beginPath();
      ctx.moveTo(x * scale, 0);
      ctx.lineTo(x * scale, H * scale);
      ctx.stroke();
    }
    for (let y = 0; y <= H; y++) {
      ctx.beginPath();
      ctx.moveTo(0, y * scale);
      ctx.lineTo(W * scale, y * scale);
      ctx.stroke();
    }
  }
}

function exportPNG() {
  // Export at 8x scale
  const exp = document.createElement('canvas');
  exp.width = W * 8; exp.height = H * 8;
  const ec = exp.getContext('2d');
  ec.imageSmoothingEnabled = false;
  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      ec.fillStyle = PALETTE[PIXELS[y][x]];
      ec.fillRect(x * 8, y * 8, 8, 8);
    }
  }
  const a = document.createElement('a');
  a.download = 'sprite_8bit.png';
  a.href = exp.toDataURL('image/png');
  a.click();
}

// Build palette swatches
const strip = document.getElementById('paletteStrip');
PALETTE.forEach(c => {
  const d = document.createElement('div');
  d.className = 'swatch';
  d.style.background = c;
  d.title = c;
  strip.appendChild(d);
});

draw();
